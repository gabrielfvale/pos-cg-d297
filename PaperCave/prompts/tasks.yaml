read:
  description: >
    Use the pdf_reader tool to read the file at '{pdf_path}'.
    Return the extracted text EXACTLY as the tool produced it —
    preserving all structural tags such as [SEGMENT N] or [FULL PAPER].
    Do not modify, summarize, or remove any markers.
  expected_output: >
    Full text of the scientific paper extracted from the PDF, including
    all sections (abstract, introduction, methodology, results, evaluation,
    conclusion, references) and all demarcation tags produced by the tool.

summarize:
  description: >
    Receive the full paper text extracted by the previous agent.
    Produce a structured summary using the 6 required blocks:
    CENTRAL CONTRIBUTION, PROBLEM AND CONTEXT, METHOD/SYSTEM,
    RESULTS AND METRICS, LIMITATIONS, KEY CONCEPTS.

    Scale the summary based on the paper's technical density
    (800-1200 words for dense methodological papers,
    400-600 for conceptual papers or surveys).
    Preserve all specific technical terms and quantitative data.
  expected_output: >
    Structured summary in 6 blocks, scaled to the paper's technical density,
    preserving technical terms, algorithms, tools, hardware, and numerical metrics.

select_images:
  description: >
    Receive the list of images extracted from the PDF with their textual metadata
    (caption, paragraph before, paragraph after, dimensions, page number).
    Select up to 3 most relevant images for the paper's central contribution,
    using textual context as the primary criterion and size as a tiebreaker.
    For each selected image, define the final filename (fig1_*.png) and justify.
    Return ONLY valid JSON following the ImageSelection schema.
  expected_output: >
    Valid JSON with a list of up to 3 selected images, each with
    filename, raw_filename, caption, and selection_justification.

analyze_images:
  description: >
    Receive the selected images with their textual contexts.
    For each image, produce a description of what it shows and how it relates
    to the paper's central contribution.
    If you have visual access to the image, use mode="visual".
    If inferring from text only, use mode="text_inferred".
    Return ONLY valid JSON following the ImageInsights schema.
  expected_output: >
    Valid JSON with insights for each selected image:
    filename, description (1-2 sentences), relevance, and mode.

extract:
  description: >
    Based on the paper summary provided by the previous agent,
    extract between 8 and 10 relevant conceptual elements following
    exactly the ExtractionResult schema.
    If the summary includes a VISUAL INSIGHTS block, factor it into
    the analysis.
    Order elements from most to least relevant.
    Return ONLY valid JSON, no additional text, no markdown.
  expected_output: >
    Valid JSON with paperTitle, centralContribution, and a list of 8-10 elements,
    each with name, category, description, relevanceScore, and justification.

map:
  description: >
    Based on the extracted elements provided by the previous agent,
    select the {card_count} most relevant and produce a Card Manifest
    following the CardManifest schema.

    Card count required: {card_count}

    {available_figures}

    {asset_catalog_section}

    {visual_style_section}

    CRITICAL FIELD CONSTRAINTS:
    - title: maximum 30 characters — count carefully before finalizing
    - summary: maximum 80 characters — one complete, informative sentence
    - animation frames label: maximum 20 characters
    - animation frames description: maximum 120 characters
    - contentType="figure" only when assetReference is available
    - contentType="chart" requires content.data with real paper values
    - contentType="animation" requires at least 2 frames

    SELECTION REMINDERS:
    - Exactly 1 card must have priority="primary" (the central contribution)
    - At least 1 card must use contentType="figure" if figures are available
    - At least 1 card must use contentType="chart" if quantitative data exists
    - card_01 must always be the primary card

    Return ONLY valid JSON, no additional text, no markdown.
  expected_output: >
    Valid JSON following the CardManifest schema with paperTitle,
    centralContribution, cardCount={card_count}, and exactly {card_count}
    cards. Each card must have all fields filled including title (≤30 chars),
    summary (≤80 chars), contentType, content, conceptualOrigin,
    whyThisCard, and styleHint.

map_simple:
  description: >
    Based on the extracted elements provided by the previous agent,
    produce a Card Manifest in SIMPLE MODE with exactly {card_count} cards.

    SIMPLE MODE RULES:
    - contentType must be "figure" or "chart" only (no animation)
    - For figure cards: use assetReference if available, otherwise describe
      the content as a static image description in content.description
    - For chart cards: always include real paper values in content.data
    - title: maximum 30 characters
    - summary: maximum 80 characters

    Return ONLY valid JSON following the CardManifest schema.
  expected_output: >
    Valid JSON following the CardManifest schema with exactly {card_count}
    cards using only contentType="figure" or contentType="chart".

review:
  description: >
    Evaluate the Card Manifest provided by the previous agent.
    Assign a score (0.0 to 1.0) for each card based on its grounding
    in the actual paper content. Keep the scores in the same order as the
    cards appear in the manifest, using each card's title (or id) as
    suggestedName.
    If 2 or more cards have score < 0.6, set approved=false and provide
    specific per-card feedback to guide the retry.
    Previous attempt history: {attempt_history}
    Current attempt: {current_attempt}
    Return ONLY valid JSON following the ReviewResult schema.
  expected_output: >
    Valid JSON with attempt, approved, objectScores (score, confidence, feedback
    for each card), and overallFeedback.
