read:
  description: >
    Use the pdf_reader tool to read the file at '{pdf_path}'.
    Return the extracted text EXACTLY as the tool produced it —
    preserving all structural tags such as [SEGMENT N] or [FULL PAPER].
    Do not modify, summarize, or remove any markers.
  expected_output: >
    Full text of the scientific paper extracted from the PDF, including
    all sections (abstract, introduction, methodology, results, evaluation,
    conclusion, references) and all demarcation tags produced by the tool.

summarize:
  description: >
    Receive the full paper text extracted by the previous agent.
    Produce a structured summary using the 6 required blocks:
    CENTRAL CONTRIBUTION, PROBLEM AND CONTEXT, METHOD/SYSTEM,
    RESULTS AND METRICS, LIMITATIONS, KEY CONCEPTS.

    Scale the summary based on the paper's technical density
    (800-1200 words for dense methodological papers,
    400-600 for conceptual papers or surveys).
    Preserve all specific technical terms and quantitative data.
  expected_output: >
    Structured summary in 6 blocks, scaled to the paper's technical density,
    preserving technical terms, algorithms, tools, hardware, and numerical metrics.

analyze_images:
  description: >
    Receive the paper figures (already extracted as FIG_*.png files) with
    their captions from the paper. For each figure, produce a description of
    what it shows and how it relates to the paper's central contribution.
    If you have visual access to the image file, use mode="visual".
    If inferring from caption and context only, use mode="text_inferred".
    
    You must classify each figure under the field `visualType` using one of:
      - "photo_or_screenshot": Real-world photos, 3D avatars, or in-game/interface screenshots.
      - "chart_or_graph": Data charts (bar charts, line graphs, scatter plots) showing quantitative evaluation.
      - "diagram_or_flowchart": Abstract system architectures, network node topologies, or step-by-step algorithms.
      - "table_image": Raw grid tables printed as images.

    Return ONLY valid JSON following the ImageInsights schema.
  expected_output: >
    Valid JSON with insights for each figure:
    filename (e.g. "FIG1.png"), description (1-2 sentences),
    relevance (how it relates to the paper's contribution), mode, and visualType.

extract:
  description: >
    Based on the paper summary provided by the previous agent,
    extract between 8 and 10 relevant conceptual elements following
    exactly the ExtractionResult schema.
    If the summary includes a VISUAL INSIGHTS block, factor it into
    the analysis. Also note which elements naturally group together
    (same section, compared conditions, logical sequence) — mark them
    with groupingHint pointing to the other element's name.
    Order elements from most to least relevant.
    Return ONLY valid JSON, no additional text, no markdown.
  expected_output: >
    Valid JSON with paperTitle, centralContribution, and a list of 8-10 elements,
    each with name, category, description, relevanceScore, justification,
    and groupingHint (the name of a related element, or nullmap:
  description: >
    Com base nas informações do paper e nas classificações visuais das figuras fornecidas pelo Vision Analyst,
    produza um Unit Manifest organizando as cartas estritamente nas 6 categorias a seguir:

    1. graphical_representation (Tipo: "card", priority="secondary" ou "primary"):
       - O elemento visual (figura) mais importante de todo o paper (ex: o diagrama geral da arquitetura, pipeline ou pipeline terminal).
       - Selecione a FIG mais representativa para ser esta carta (contentType="figure" com assetReference correspondente).
       - IMPORTANTE: Esta figura é excluída de qualquer outra stack abaixo.
       - Se o paper não tiver figuras, descreva conceitualmente (contentType="text_panel").

    2. abstract (Tipo: "card", priority="secondary"):
       - Resumo objetivo do paper (contentType="text_panel").

    3. contribution (Tipo: "card", priority="primary"):
       - A contribuição principal e inovação do paper (contentType="text_panel"). Deve ser a única carta com priority="primary" (geralmente id="unit_01").

    4. image (Tipo: "stack", priority="secondary"):
       - Stack contendo de 2 a 4 sub-cartas (items) com figuras do paper classificadas pelo Vision Analyst como "photo_or_screenshot" ou "diagram_or_flowchart".
       - Exclua a figura que já foi usada em "graphical_representation".
       - contentType de cada item deve ser "figure" com seu assetReference correspondente.

    5. graph (Tipo: "stack", priority="secondary"):
       - Stack contendo de 2 a 4 sub-cartas (items) correspondentes aos gráficos e representações quantitativas do paper (Figuras classificadas como "chart_or_graph").
       - IMPORTANTE: Não confunda "graph" de gráfico de barras/linhas com "graph" de grafos de redes de nós/fluxogramas (que devem ser mapeados como "diagram_or_flowchart" em "image").
       - Use contentType="figure" e o correspondente assetReference (ex: FIG3 ou FIG1_2) para exibir a imagem do gráfico, e inclua quaisquer dados numéricos extraídos em content.data.

    6. table (Tipo: "stack", priority="secondary"):
       - Stack contendo de 2 a 4 sub-cartas (items) correspondentes às tabelas de dados do paper (incluindo figuras classificadas como "table_image" convertidas para texto estruturado).
       - Cada item deve conter as colunas e linhas com dados reais do paper em content.data.

    REGRAS CRÍTICAS:
    - O número total de draggable units (cards + stacks) gerados deve ser colocado em unitCount e deve ser exatamente igual ao tamanho da lista de units criada.
    - Se uma categoria de stack (image, graph, table) não tiver elementos no paper, não gere essa unidade. O total de unidades geradas variará de 3 a 6.
    - Limites de caracteres:
      - title (cards) / stackLabel (stacks): máximo 30 caracteres.
      - summary (single cards only): máximo 80 caracteres.
      - frames de animação não são necessários (remova templates antigos).
      - Todos os dados numéricos de tabelas/gráficos devem vir limpos em content.data.

    {available_figures}
    {asset_catalog_section}
    {visual_style_section}

    Retorne APENAS o JSON válido seguindo o schema UnitManifest.
  expected_output: >
    JSON válido contendo paperTitle, centralContribution, unitCount (quantidade de unidades geradas, entre 3 e 6),
    e a lista de units seguindo exatamente as 6 categorias definidas. Cada unit deve ter: id (unit_01...),
    type ("card" ou "stack"), priority, title/stackLabel, category (uma das 6 listadas), contentType, content, styleHint.stadas), contentType, content, styleHint.

map_simple:
  description: >
    Based on the extracted elements provided by the previous agent,
    produce a Unit Manifest in SIMPLE MODE with exactly {card_count} single
    cards (no stacks). contentType must be "figure", "chart", or "table" only
    (no animation or text_panel).

    Unit count required: {card_count}

    SIMPLE MODE RULES:
    - All units must be type="card" (no stacks)
    - contentType must be "figure", "chart", or "table" only
    - For figure cards: use assetReference if available; never use figure without FIG*.png
    - For chart/table cards: always include real paper values in content.data
    - title: maximum 30 characters
    - summary: maximum 80 characters

    Return ONLY valid JSON following the UnitManifest schema.
  expected_output: >
    Valid JSON following the UnitManifest schema with exactly {card_count}
    single card units (type="card") using only contentType="figure",
    "chart", or "table".

review:
  description: >
    Evaluate the Unit Manifest provided by the previous agent.
    Assign a score (0.0 to 1.0) for each unit based on its grounding
    in the actual paper content. Keep the scores in the SAME ORDER as the
    units appear in the manifest, using each unit's title or stackLabel
    (or id) as suggestedName.
    If 2 or more units have score < 0.6, set approved=false and provide
    specific per-unit feedback to guide the retry.
    For stack units, evaluate whether the grouping is justified and whether
    each item's contentType fits the data.
    Previous attempt history: {attempt_history}
    Current attempt: {current_attempt}
    Return ONLY valid JSON following the ReviewResult schema.
  expected_output: >
    Valid JSON with attempt, approved, objectScores (score, confidence, feedback
    for each unit), and overallFeedback.
